# =============================================================================
# Flutter CI/CD Pipeline - Production Grade
# =============================================================================
# Purpose: Validate code quality on all merged branches
# =============================================================================

name: Flutter CI/CD

on:
  pull_request:
    types: [closed]
    branches:
      - '**'

  # Allow manual trigger
  workflow_dispatch:

# Cancel in-progress runs when new commit is pushed to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Stage 1: Code Quality & Testing
  # ===========================================================================
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # This ensures the pipeline ONLY runs if the PR was actually merged
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:'

      - name: 📦 Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ✅ Verify dependencies
        run: flutter pub get --offline

      - name: 🔬 Run static analysis
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: 🧪 Run unit tests
        run: flutter test --coverage --reporter expanded

      - name: 📊 Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Stage 2: Build Summary
  # ===========================================================================
  summary:
    name: Build Summary
    needs: [validate]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📋 Generate summary
        run: |
          echo "## 🎯 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Validation: ${{ needs.validate.result }}" >> $GITHUB_STEP_SUMMARY